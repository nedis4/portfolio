:root {
  --paper: #fcfbf7;
  --paper-2: #f4f1e9;
  --ink: #232220;
  --ink-soft: #56544d;
  --ink-faint: #8e8b81;
  --red: #cf3a1b;
  --red-soft: rgba(207, 58, 27, 0.08);
  --blue: #5b89b4;
  --grid: rgba(91, 137, 180, 0.085);
  --grid-major: rgba(91, 137, 180, 0.16);
  --tape: rgba(232, 221, 184, 0.88);
  --rule: #ddd8cb;

  --sans: "Space Grotesk", -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --hand: "Caveat", "Bradley Hand", "Segoe Script", cursive;
  --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;

  /* the classic hand-drawn rectangle trick */
  --wobble: 255px 15px 225px 15px / 15px 225px 15px 255px;
  --wobble-2: 15px 225px 15px 255px / 255px 15px 225px 15px;

  --gutter: clamp(20px, 5vw, 64px);
  --topbar-h: 64px;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.62;
  background-color: var(--paper);
  /* 5mm drafting grid + major lines */
  background-image:
    linear-gradient(var(--grid-major) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-major) 1px, transparent 1px),
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 160px 160px, 160px 160px, 32px 32px, 32px 32px;
  -webkit-font-smoothing: antialiased;
}
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
p { margin: 0 0 1em; }
h1, h2, h3, h4 { margin: 0; line-height: 1.08; font-weight: 700; letter-spacing: -0.015em; }
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; padding: 0; }
::selection { background: var(--red); color: var(--paper); }

.page { max-width: 1180px; margin: 0 auto; padding: 0 var(--gutter); }

/* ─── Type utilities ─────────────────────────────────────────────── */
.t-mono { font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em; color: var(--ink-soft); }
.t-mono-sm { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); }
.t-hand { font-family: var(--hand); font-size: 22px; font-weight: 500; line-height: 1.15; color: var(--red); letter-spacing: 0; }
.t-hand--ink { color: var(--ink-soft); }
.t-hand--lg { font-size: clamp(26px, 3.4vw, 34px); }

/* ─── Hand-drawn boxes, stamps, tape ─────────────────────────────── */
.hd-box {
  display: inline-block;
  border: 1.6px solid var(--ink);
  border-radius: var(--wobble);
  padding: 9px 18px;
  background: var(--paper);
  transition: background 0.18s ease, color 0.18s ease, rotate 0.18s ease;
}
.hd-box:hover { background: var(--ink); color: var(--paper); }
a.hd-box, button.hd-box { cursor: pointer; }

.stamp {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--red);
  border: 2px solid var(--red);
  border-radius: 7px;
  padding: 7px 11px 6px;
  rotate: -2.5deg;
  opacity: 0.92;
  text-shadow: 0.4px 0.4px 0 rgba(207, 58, 27, 0.35);
  box-shadow: inset 0 0 0 0.6px rgba(207, 58, 27, 0.5);
  background:
    radial-gradient(circle at 30% 60%, rgba(252,251,247,.35) 0 2px, transparent 3px),
    radial-gradient(circle at 70% 30%, rgba(252,251,247,.3) 0 2px, transparent 3px);
}

.tape {
  position: absolute;
  width: 92px;
  height: 26px;
  background: var(--tape);
  box-shadow: 0 1px 3px rgba(35, 34, 32, 0.12);
  clip-path: polygon(3% 8%, 97% 0%, 100% 88%, 95% 100%, 4% 95%, 0% 82%);
  z-index: 2;
  pointer-events: none;
}
.tape--tl { top: -12px; left: 18px; rotate: -5deg; }
.tape--tr { top: -12px; right: 18px; rotate: 4deg; }

/* ─── Doodle SVG + draw-on-scroll system ─────────────────────────── */
.doodle { display: block; overflow: visible; }
.doodle path, .doodle line, .doodle circle, .doodle ellipse, .doodle polyline {
  fill: none;
  stroke: var(--red);
  stroke-width: 2.4;
  stroke-linecap: round;
  stroke-linejoin: round;
  vector-effect: non-scaling-stroke;
}
.doodle--ink path, .doodle--ink line, .doodle--ink circle, .doodle--ink polyline { stroke: var(--ink); }
.doodle--thin path, .doodle--thin line { stroke-width: 1.6; }

/* every path carries pathLength="1" → no JS measuring needed */
.draw path, .draw line, .draw circle, .draw ellipse, .draw polyline {
  stroke-dasharray: 1;
  stroke-dashoffset: 1;
  transition: stroke-dashoffset 0.9s cubic-bezier(0.45, 0, 0.2, 1);
  transition-delay: var(--d, 0ms);
}
.draw.in path, .draw.in line, .draw.in circle, .draw.in ellipse, .draw.in polyline,
.in > .draw path, .in > .draw line, .in > .draw circle, .in > .draw polyline {
  stroke-dashoffset: 0;
}

/* fade/rise reveal */
.reveal { opacity: 0; translate: 0 16px; transition: opacity 0.65s ease, translate 0.65s ease; transition-delay: var(--d, 0ms); }
.reveal.in { opacity: 1; translate: 0 0; }

@keyframes wiggle {
  0%, 100% { rotate: 0deg; }
  30% { rotate: 0.9deg; }
  70% { rotate: -0.9deg; }
}
.wiggle:hover { animation: wiggle 0.34s ease-in-out; }

/* ─── Pencil progress line ───────────────────────────────────────── */
.progress {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 10px;
  z-index: 90;
  pointer-events: none;
}
.progress svg { width: 100%; height: 10px; display: block; }
.progress path {
  fill: none;
  stroke: var(--red);
  stroke-width: 2.6;
  stroke-linecap: round;
  stroke-dasharray: 1;
  stroke-dashoffset: 1; /* driven by JS: 1 → 0 */
}

/* ─── Topbar ─────────────────────────────────────────────────────── */
.topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  min-height: var(--topbar-h);
  padding: 8px var(--gutter);
  background: rgba(252, 251, 247, 0.88);
  -webkit-backdrop-filter: saturate(140%) blur(10px);
  backdrop-filter: saturate(140%) blur(10px);
  border-bottom: 1.5px solid transparent;
  transition: border-color 0.25s ease;
}
.topbar.is-stuck { border-bottom-color: var(--ink); }
.brand {
  display: flex;
  align-items: baseline;
  gap: 10px;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -0.01em;
}
.brand .t-hand { font-size: 19px; translate: 0 -2px; }
.topbar nav { display: flex; align-items: center; gap: 6px; }
.topbar nav a {
  position: relative;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-soft);
  padding: 13px 12px;
}
.topbar nav a .nav-ring {
  position: absolute;
  inset: 4px 0;
  width: 100%;
  height: calc(100% - 8px);
  pointer-events: none;
}
.topbar nav a.active { color: var(--ink); }
.topbar nav a .nav-ring path { transition: stroke-dashoffset 0.55s ease; }
.topbar nav .pill { margin-left: 10px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; padding: 10px 16px; }

/* ─── Hero ───────────────────────────────────────────────────────── */
.hero { position: relative; padding: clamp(56px, 9vh, 110px) 0 24px; }
.hero .kicker { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 26px; }
.hero h1 {
  font-size: clamp(44px, 8.2vw, 104px);
  letter-spacing: -0.03em;
  line-height: 0.98;
  max-width: 11ch;
}
.hero .h1-wrap { position: relative; display: inline-block; }
.hero .h1-under { width: min(420px, 56%); height: 16px; margin-top: 6px; }
.hero .anno {
  position: absolute;
  right: -10px;
  top: -34px;
  display: flex;
  align-items: flex-end;
  gap: 4px;
  rotate: 2deg;
}
.hero .anno .doodle { width: 54px; height: 40px; }
.hero .lede {
  max-width: 60ch;
  margin-top: 28px;
  font-size: clamp(16px, 1.6vw, 19px);
  color: var(--ink-soft);
}
.hero .lede b { color: var(--ink); font-weight: 600; }
.hero .facts { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 30px; }
.hero .facts .hd-box { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; padding: 8px 14px; }
.hero .dimline { margin-top: 38px; max-width: 520px; }
.dimline { position: relative; }
.dimline svg { width: 100%; height: 26px; }
.dimline .dim-label {
  position: absolute;
  left: 50%;
  top: -16px;
  translate: -50% 0;
  white-space: nowrap;
}
.hero .scrollcue {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 44px;
}
.hero .scrollcue .doodle { width: 26px; height: 38px; }
.skyline { margin-top: 36px; }
.skyline svg { width: 100%; height: clamp(48px, 7vw, 80px); }
.skyline path { stroke: var(--ink); stroke-width: 2; }
.skyline .draw path { transition-duration: 2.6s; }

/* ─── Sections ───────────────────────────────────────────────────── */
.section { padding: clamp(64px, 9vh, 120px) 0 32px; scroll-margin-top: 86px; }
.section-head { display: flex; align-items: baseline; gap: 22px; margin-bottom: 40px; flex-wrap: wrap; }
.section-head .meta { flex-shrink: 0; }
.section-head h2 { font-size: clamp(30px, 4.4vw, 52px); letter-spacing: -0.025em; position: relative; }
.section-head .h2-wrap { position: relative; display: inline-block; }
.section-head .h2-under { position: absolute; left: -2px; right: -8px; bottom: -10px; height: 12px; width: calc(100% + 10px); }
.section-head .counter { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--ink-faint); }

/* ─── About ──────────────────────────────────────────────────────── */
.about-grid { display: grid; grid-template-columns: 340px 1fr; gap: clamp(28px, 5vw, 72px); align-items: start; }
.about-grid .lhs { position: sticky; top: 110px; }
.portrait-fig { position: relative; margin: 0; rotate: -1.2deg; }
.portrait-fig img { width: 100%; height: auto; border: 1.5px solid var(--ink); }
.portrait-fig .drop-cap { padding-top: 10px; }
.portrait-anno { display: flex; justify-content: flex-end; align-items: center; gap: 6px; margin-top: 10px; }
.portrait-anno .doodle { width: 44px; height: 22px; scale: -1 1; }
.about-grid .bio p { max-width: 62ch; }
.about-grid .bio p::first-letter { font-weight: 600; }
.margin-note { display: flex; align-items: center; gap: 8px; margin: 18px 0 26px; }
.margin-note .doodle { width: 40px; height: 26px; flex-shrink: 0; }

/* ─── Work / projects ────────────────────────────────────────────── */
.work-grid { display: grid; grid-template-columns: 1fr 150px; gap: 36px; align-items: start; }
.work-projects { min-width: 0; }
.work-intro-stamp { display: flex; gap: 16px; align-items: center; margin: -18px 0 30px; }

.project { padding: 56px 0 40px; border-top: 1.5px dashed var(--rule); scroll-margin-top: 86px; }
.project:first-child { border-top: none; padding-top: 12px; }
.project-head { display: grid; grid-template-columns: 92px 1fr auto; gap: 22px; align-items: start; margin-bottom: 26px; }
.numbubble { position: relative; width: 76px; height: 76px; }
.numbubble svg { position: absolute; inset: 0; width: 100%; height: 100%; }
.numbubble b {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  font-size: 26px; font-weight: 700; letter-spacing: -0.02em;
}
.project-head h3 { font-size: clamp(26px, 3.6vw, 44px); letter-spacing: -0.025em; }
.project-head .subtitle { color: var(--ink-soft); margin: 8px 0 0; font-size: 17px; }
.project-head .cityline { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 12px; }
.project-head .right { display: flex; flex-direction: column; align-items: flex-end; gap: 12px; }

.project-meta {
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 8px 22px;
  margin: 26px 0;
  padding: 20px 22px;
  border: 1.5px solid var(--ink);
  border-radius: var(--wobble-2);
  background: rgba(252, 251, 247, 0.7);
}
.project-meta .k { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); padding-top: 5px; }
.project-meta .v { font-size: 15px; color: var(--ink-soft); }

.project-notes { display: grid; grid-template-columns: 120px 1fr; gap: 22px; margin: 28px 0; }
.project-notes .body { max-width: 64ch; }
.project-notes .body p:first-child { font-size: 17.5px; color: var(--ink); }

.project-media { display: grid; gap: 26px; margin: 34px 0; }
.project-media .row { display: grid; gap: 22px; min-width: 0; }
.media-fig { margin: 0; min-width: 0; position: relative; }
.media-fig:nth-child(odd) { rotate: 0.45deg; }
.media-fig:nth-child(even) { rotate: -0.4deg; }
.media-fig { transition: rotate 0.25s ease, scale 0.25s ease; }
.media-fig:hover { rotate: 0deg; scale: 1.005; }
/* HDR gain-map stills: no transform / opacity / filter — any of those make
   the browser composite the image and flatten its gain map to SDR. Rendered
   flat and untilted; !important beats the nth-child tilt above. */
.media-fig--hdr,
.media-fig--hdr:hover { rotate: 0deg !important; scale: 1 !important; transition: none; }
.media-frame {
  position: relative;
  overflow: hidden;
  background: var(--paper-2);
  border: 1.5px solid var(--ink);
}
.media-frame img { width: 100%; height: 100%; object-fit: cover; }
.media-wide   { aspect-ratio: 16 / 10; }
.media-tall   { aspect-ratio: 4 / 5; }
.media-square { aspect-ratio: 1 / 1; }
.media-cinema { aspect-ratio: 21 / 9; }
.drop-cap {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 16px;
  padding-top: 9px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-faint);
}
.drop-cap .t-hand { font-size: 17px; text-transform: none; letter-spacing: 0; }

/* sketchy placeholder for stills that are still to come */
.media-ph {
  display: grid;
  place-items: center;
  border: 2px dashed var(--ink-faint);
  border-radius: var(--wobble);
  background: repeating-linear-gradient(-45deg, transparent 0 14px, rgba(91, 137, 180, 0.05) 14px 15px);
  color: var(--ink-faint);
  text-align: center;
  padding: 18px;
}
.media-ph .t-hand { color: var(--ink-faint); }

.project-features { display: grid; grid-template-columns: 120px 1fr; gap: 22px; margin: 34px 0 8px; }
.project-features ul { list-style: none; margin: 0; padding: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 12px 32px; }
.project-features li { display: flex; gap: 12px; align-items: flex-start; font-size: 15px; color: var(--ink-soft); }
.project-features li .tick { width: 20px; height: 18px; flex-shrink: 0; margin-top: 4px; }
.interventions ul { grid-template-columns: 1fr; }
.interventions li b { font-weight: 600; color: var(--ink); }

/* ─── Hyperlapse (HDR gain-map safe — plain <img>, no canvas) ────── */
.hyperlapse { position: relative; margin: 0; height: 165vh; }
/* offset leaves room for the "scrub me" note (top:-34) to sit clear of the
   ~64px header — that gap is the margin, the note stays above the image */
.hl-sticky { position: sticky; top: 112px; }
.hl-stage {
  position: relative;
  overflow: hidden;
  width: 100%;
  max-height: calc(100vh - 170px);
  max-height: calc(100svh - 170px);
  background: var(--paper-2);
  border: 1.5px solid var(--ink);
}
.hl-stage img {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.hl-note { position: absolute; top: -34px; right: 4px; display: flex; align-items: center; gap: 6px; z-index: 3; }
.hl-note .doodle { width: 26px; height: 32px; }
.hl-counter { font-variant-numeric: tabular-nums; }

/* ─── Project side nav ("drawing index") ─────────────────────────── */
.pnav {
  position: sticky;
  top: 130px;
  opacity: 0;
  translate: 18px 0;
  transition: opacity 0.4s ease, translate 0.4s ease;
  pointer-events: none;
}
.pnav.is-visible { opacity: 1; translate: 0 0; pointer-events: auto; }
.pnav .pnav-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 12px; }
.pnav ul { list-style: none; margin: 0; padding: 0; display: grid; gap: 4px; }
.pnav li {
  display: grid;
  grid-template-columns: 26px 1fr;
  gap: 8px;
  align-items: baseline;
  padding: 7px 8px;
  cursor: pointer;
  border-radius: 8px;
  transition: background 0.15s ease;
}
.pnav li:hover { background: var(--red-soft); }
.pnav .pnav-num { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); }
.pnav .pnav-title { font-size: 12.5px; line-height: 1.3; color: var(--ink-soft); }
.pnav .pnav-title em { display: block; font-style: normal; font-family: var(--mono); font-size: 9.5px; color: var(--ink-faint); margin-top: 2px; }
.pnav li.is-active .pnav-num { color: var(--red); font-weight: 700; }
.pnav li.is-active .pnav-title { color: var(--ink); }

/* ─── CV — drawn timeline ────────────────────────────────────────── */
.cv-block { display: grid; grid-template-columns: 170px 1fr; gap: 26px; padding: 34px 0; border-top: 1.5px dashed var(--rule); }
.cv-block:first-of-type { border-top: none; }
.cv-block .lab { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-faint); padding-top: 6px; }
.cv-items { position: relative; display: grid; gap: 0; }
.cv-items .spine {
  position: absolute;
  left: 5px; top: 10px; bottom: 10px;
  width: 12px;
  pointer-events: none;
}
.cv-items .spine svg { width: 100%; height: 100%; }
.cv-items .spine path { stroke: var(--ink); stroke-width: 1.8; transition-duration: 1.6s; }
.cv-item {
  display: grid;
  grid-template-columns: 120px 1fr 1fr;
  gap: 18px;
  padding: 13px 0 13px 34px;
  position: relative;
  align-items: baseline;
}
.cv-item::before {
  content: "";
  position: absolute;
  left: 6px; top: 21px;
  width: 9px; height: 9px;
  border: 2px solid var(--red);
  border-radius: 50% 46% 52% 48%;
  background: var(--paper);
}
.cv-item .yr { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); white-space: nowrap; }
.cv-item .name { font-weight: 600; font-size: 16px; white-space: pre-line; }
.cv-item .role { font-size: 14px; color: var(--ink-soft); }

.skills-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
.skills-grid h4 { font-size: 13px; font-family: var(--mono); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; color: var(--ink-soft); margin-bottom: 14px; }
.skills-grid ul { list-style: none; margin: 0; padding: 0; display: flex; flex-wrap: wrap; gap: 9px; }
.skills-grid li {
  font-size: 13.5px;
  color: var(--ink-soft);
  border: 1.4px solid var(--ink-soft);
  border-radius: var(--wobble);
  padding: 5px 13px;
  transition: color 0.15s ease, border-color 0.15s ease, rotate 0.2s ease;
}
.skills-grid li:hover { color: var(--red); border-color: var(--red); rotate: -1deg; }

.lang-list { display: grid; gap: 14px; max-width: 560px; }
.lang-row { display: grid; grid-template-columns: 110px 1fr; gap: 2px 16px; align-items: center; }
.lang-row .name { font-weight: 600; font-size: 15px; }
.lang-row .level { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); letter-spacing: 0.08em; grid-column: 2; margin-top: 0; }
.lang-bar {
  position: relative;
  height: 12px;
  border: 1.4px solid var(--ink);
  border-radius: 6px 8px 7px 9px;
  overflow: hidden;
}
.lang-bar i {
  position: absolute;
  inset: 1px;
  width: 0;
  background: repeating-linear-gradient(-55deg, var(--red) 0 2.5px, transparent 2.5px 6.5px);
  transition: width 1.1s cubic-bezier(0.5, 0, 0.2, 1);
  transition-delay: var(--d, 0ms);
}
.lang-row.in .lang-bar i { width: var(--w); }

/* ─── Contact ────────────────────────────────────────────────────── */
.contact { padding-bottom: 60px; }
.contact .thanks { margin: 6px 0 10px; }
.contact .thanks .t-hand { font-size: clamp(40px, 6vw, 64px); display: inline-block; rotate: -1.5deg; }
.contact-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: clamp(28px, 5vw, 72px); align-items: start; }
.contact-grid .pitch { max-width: 46ch; color: var(--ink-soft); font-size: 17px; }
.contact-list { display: grid; gap: 4px; }
.contact-row {
  display: grid;
  grid-template-columns: 86px 1fr auto;
  gap: 14px;
  align-items: center;
  padding: 15px 4px;
  border-bottom: 1.5px dashed var(--rule);
}
.contact-row .k { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); }
.contact-row .v { font-size: 17px; font-weight: 500; word-break: break-word; }
.contact-row .v a:hover { color: var(--red); }
.contact-row .copy {
  font-family: var(--hand);
  font-size: 17px;
  color: var(--ink-faint);
  cursor: pointer;
  border: 1.4px solid transparent;
  border-radius: var(--wobble);
  padding: 2px 12px;
  transition: color 0.15s ease, border-color 0.15s ease;
}
.contact-row .copy:hover { color: var(--red); border-color: var(--red); }
.contact-row .copy.did { color: var(--red); }
.contact-cta { margin-top: 30px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.contact-cta .hd-box { font-size: 17px; font-weight: 600; padding: 13px 26px; }
.contact-cta .doodle { width: 56px; height: 30px; }

/* ─── Colophon ───────────────────────────────────────────────────── */
.colophon {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 18px;
  flex-wrap: wrap;
  padding: 26px var(--gutter) 34px;
  border-top: 1.5px solid var(--ink);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-faint);
  max-width: 1180px;
  margin: 40px auto 0;
}
.colophon button { font-family: var(--mono); font-size: 11px; color: var(--ink-soft); letter-spacing: 0.06em; }
.colophon button:hover { color: var(--red); }

/* ─── Responsive ─────────────────────────────────────────────────── */
@media (max-width: 1024px) {
  .work-grid { grid-template-columns: 1fr; }
  .pnav { display: none; }
}
@media (max-width: 900px) {
  .about-grid { grid-template-columns: 1fr; }
  .about-grid .lhs { position: static; max-width: 380px; }
  .project-media .row { grid-template-columns: 1fr !important; }
  .project-features { grid-template-columns: 1fr; }
  .project-features ul { grid-template-columns: 1fr; }
  .project-notes { grid-template-columns: 1fr; }
  .project-head { grid-template-columns: 60px 1fr; }
  .project-head .right { grid-column: 1 / -1; flex-direction: row; align-items: center; }
  .numbubble { width: 56px; height: 56px; }
  .numbubble b { font-size: 20px; }
  .cv-block { grid-template-columns: 1fr; gap: 12px; }
}
@media (max-width: 640px) {
  .topbar nav .pill { display: none; }
  .topbar nav { gap: 0; }
  .topbar nav a { padding: 13px 8px; font-size: 10px; }
  .brand .t-hand { display: none; }
  .hero .anno { position: static; rotate: 0deg; margin-bottom: 10px; }
  .cv-item { grid-template-columns: 1fr; gap: 2px; padding-left: 28px; }
  .cv-item .yr { order: -1; }
  .skills-grid { grid-template-columns: 1fr; }
  .contact-grid { grid-template-columns: 1fr; }
  .contact-row { grid-template-columns: 70px 1fr auto; }
  .contact-row .v { font-size: 15px; }
  .hl-sticky { top: 106px; }
  .hyperlapse { height: 150vh; }
  .section { scroll-margin-top: 76px; }
}
@media (max-width: 480px) {
  .hero h1 { font-size: clamp(38px, 11.5vw, 52px); }
  .hero .facts .hd-box { padding: 7px 11px; font-size: 10px; }

  /* ── media distribution: hyperlapse & landscape solo, others pair ─ */
  function mediaRows(media) {
    var rows = [], buf = [];
    function flush() {
      while (buf.length) { rows.push(buf.splice(0, 2)); }
    }
    media.forEach(function (m) {
      var solo = m.hyperlapse || m.kind === "cinema" || m.kind === "wide";
      if (solo) { flush(); rows.push([m]); }
      else { buf.push(m); if (buf.length === 2) flush(); }
    });
    flush();
    return rows;
  }

  /* ── HDR-safe hyperlapse (plain <img> double-buffer, never canvas) ─ */
  function initHyperlapse(figure) {
    var cfg;
    try { cfg = JSON.parse(figure.getAttribute("data-hl")); } catch (e) { return function () {}; }
    var A = figure.querySelector(".hl-a"), B = figure.querySelector(".hl-b");
    var counter = figure.querySelector(".hl-counter");
    var sticky = figure.querySelector(".hl-sticky");
    if (cfg.scroll) figure.style.height = cfg.scroll;

    var pad = cfg.pad || 0, first = cfg.first || 0, last = cfg.last || 0;
    function url(i) {
      var s = pad ? String(i).padStart(pad, "0") : String(i);
      return cfg.dir + "/" + (cfg.prefix || "") + s + (cfg.suffix || "") + "." + (cfg.ext || "jpg");
    }
    var n = Math.max(2, Math.min(cfg.frames || 80, last - first + 1));
    var idxs = [];
    for (var k = 0; k < n; k++) idxs.push(first + Math.round((k * (last - first)) / (n - 1)));
    var loaded = new Array(n).fill(false);
    var cur = 0, want = 0, swapping = false, preloading = false, front = A, back = B;

    function setCounter(i) {
      if (counter) counter.textContent = String(i + 1).padStart(3, "0") + " / " + String(n).padStart(3, "0");
    }
    front.src = url(idxs[0]); loaded[0] = true; setCounter(0);

    function preload() {
      if (preloading) return; preloading = true;
      var next = 1, inflight = 0;
      function pump() {
        while (inflight < 6 && next < n) {
          var kk = next++; var im = new Image(); inflight++;
          im.onload = im.onerror = (function (j) { return function () { inflight--; loaded[j] = true; pump(); }; })(kk);
          im.src = url(idxs[kk]);
        }
      }
      pump();
    }
    function nearest(i) {
      if (loaded[i]) return i;
      for (var d = 1; d < n; d++) {
        if (i - d >= 0 && loaded[i - d]) return i - d;
        if (i + d < n && loaded[i + d]) return i + d;
      }
      return 0;
    }
    function swap() {
      if (swapping) return;
      var target = nearest(want);
      if (target === cur) return;
      swapping = true;
      function done() {
        swapping = false;
        back.style.visibility = "visible";
        front.style.visibility = "hidden";
        var t = front; front = back; back = t;
        cur = target; setCounter(cur);
        if (nearest(want) !== cur) requestAnimationFrame(swap);
      }
      back.src = url(idxs[target]);
      if (back.decode) back.decode().then(done, done);
      else if (back.complete) done();
      else { back.onload = done; back.onerror = done; }
    }
    var reduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    return function update() {
      var r = figure.getBoundingClientRect();
      var vh = window.innerHeight;
      if (reduced) return;
      if (r.top < vh * 1.5 && r.bottom > -vh * 0.5) preload();
      var T = parseFloat(getComputedStyle(sticky).top) || 0;
      var travel = Math.max(1, figure.offsetHeight - sticky.offsetHeight);
      var p = Math.min(1, Math.max(0, (T - r.top) / travel));
      want = Math.round(p * (n - 1));
      if (want !== cur) swap();
    };
  }

  /* ── scroll-driven systems ────────────────────────────────────── */
  function wire() {
    var topbarEl = document.getElementById("topbar");
    var progPath = document.getElementById("prog-path");
    var spyLinks = [].slice.call(document.querySelectorAll("[data-spy]"));
    var pnav = document.getElementById("pnav");
    var pnavItems = [].slice.call(document.querySelectorAll("[data-pnav]"));
    var hls = [].slice.call(document.querySelectorAll(".hyperlapse")).map(initHyperlapse);

    // reveal + draw-on-scroll
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
      });
    }, { threshold: 0.16, rootMargin: "0px 0px -6% 0px" });
    document.querySelectorAll(".reveal, .draw, .lang-row").forEach(function (n) { io.observe(n); });

    // project-nav: jump on click
    pnavItems.forEach(function (li) {
      li.addEventListener("click", function () {
        var t = document.getElementById(li.getAttribute("data-pnav"));
        if (t) t.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    });

    // contact links assembled on click → no clickable address sits in the DOM
    // (scheme split so the literal token isn't greppable in the source either)
    document.querySelectorAll(".js-mail").forEach(function (a) {
      a.addEventListener("click", function (e) { e.preventDefault(); location.href = "mai" + "lto:" + EMAIL; });
    });
    document.querySelectorAll(".js-tel").forEach(function (a) {
      a.addEventListener("click", function (e) { e.preventDefault(); location.href = "te" + "l:" + PHONE.replace(/\s/g, ""); });
    });
    // copy buttons (value assembled from key, never stored in a DOM attribute)
    document.querySelectorAll("[data-ck]").forEach(function (b) {
      b.addEventListener("click", function () {
        try {
          navigator.clipboard.writeText(b.getAttribute("data-ck") === "email" ? EMAIL : PHONE);
          var prev = b.textContent; b.textContent = "copied!"; b.classList.add("did");
          setTimeout(function () { b.textContent = prev; b.classList.remove("did"); }, 1400);
        } catch (e) {}
      });
    });
    var totop = document.getElementById("totop");
    if (totop) totop.addEventListener("click", function () { window.scrollTo({ top: 0, behavior: "smooth" }); });

    var ticking = false;
    function onScroll() {
      if (ticking) return; ticking = true;
      requestAnimationFrame(function () {
        ticking = false;
        var h = document.documentElement;
        var max = h.scrollHeight - h.clientHeight;
        var sc = h.scrollTop || document.body.scrollTop;
        var p = max > 0 ? sc / max : 0;
        if (progPath) progPath.style.strokeDashoffset = String(1 - p);
        if (topbarEl) topbarEl.classList.toggle("is-stuck", sc > 10);

        // scroll-spy
        var y = sc + 130, curId = SECTIONS[0].id;
        SECTIONS.forEach(function (s) {
          var el = document.getElementById(s.id);
          if (el && el.offsetTop <= y) curId = s.id;
        });
        spyLinks.forEach(function (a) { a.classList.toggle("active", a.getAttribute("data-spy") === curId); });

        // project nav visibility + active
        var workEl = document.getElementById("work");
        if (workEl && pnav) {
          var r = workEl.getBoundingClientRect(), vh = window.innerHeight;
          pnav.classList.toggle("is-visible", r.top < vh * 0.5 && r.bottom > vh * 0.4);
          var target = vh * 0.4, best = PROJECTS[0] && PROJECTS[0].id, bestD = Infinity;
          PROJECTS.forEach(function (pr) {
            var el = document.getElementById(pr.id);
            if (!el) return;
            var rr = el.getBoundingClientRect(), dist = Math.abs(rr.top - target);
            if (rr.top <= target + 220 && dist < bestD) { bestD = dist; best = pr.id; }
          });
          pnavItems.forEach(function (li) { li.classList.toggle("is-active", li.getAttribute("data-pnav") === best); });
        }
        hls.forEach(function (fn) { fn(); });
      });
    }
    window.addEventListener("scroll", onScroll, { passive: true });
    window.addEventListener("resize", onScroll);
    onScroll();
  }

  /* ── mount ────────────────────────────────────────────────────── */
  function mount() {
    var root = document.getElementById("root");
    root.innerHTML =
      '<div class="progress">' + D.progress() + '</div>' +
      topbar() +
      '<main class="page">' + hero() + about() + work() + cv() + contact() + '</main>' +
      colophon();
    wire();
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", mount);
  else mount();
})();

</script>
</body>
</html>
